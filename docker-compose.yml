services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: medvision
      POSTGRES_PASSWORD: medvision
      POSTGRES_DB: medvision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medvision -d medvision"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://medvision:medvision@postgres:5432/medvision
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      SECRET_KEY: dev-secret-key
      CORS_ORIGINS: http://localhost:5173
      STORAGE_PATH: /data/uploads
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/backend/logs
      - upload_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://medvision:medvision@postgres:5432/medvision
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ORTHANC_URL: http://orthanc:8042
    volumes:
      - upload_data:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:v1.11.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  orthanc:
    image: jodogne/orthanc:1.12.3
    ports:
      - "8042:8042" # Web interface
      - "4242:4242" # DICOM
    volumes:
      - orthanc_data:/var/lib/orthanc/db

volumes:
  postgres_data:
  upload_data:
  qdrant_data:
  orthanc_data:
